# Use Docker's DNS + variables in proxy_pass so upstream IPs refresh when containers restart.
# (Static hostnames are resolved once at nginx start → stale IP → 502 after recreate.)
server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Variable + trailing slash in proxy_pass breaks URI forwarding; rewrite then pass full path.
    location /api/demo/ {
        set $upstream_demo demo-app:8000;
        rewrite ^/api/demo/(.*)$ /$1 break;
        proxy_pass http://$upstream_demo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/logging/ {
        set $upstream_logging logging-service:8000;
        rewrite ^/api/logging/(.*)$ /$1 break;
        proxy_pass http://$upstream_logging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/portguard/ {
        set $upstream_portguard portguard-service:8000;
        rewrite ^/api/portguard/(.*)$ /$1 break;
        proxy_pass http://$upstream_portguard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # No trailing slash on proxy_pass when using a variable: with `.../$variable/`,
    # nginx mishandles the URI and Next.js receives wrong paths — `/_next/static/*`
    # falls through as a document request (HTML) instead of CSS/JS (unstyled UI).
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
